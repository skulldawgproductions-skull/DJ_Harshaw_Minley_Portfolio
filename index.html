    /* ============================================================
       DESIGN TOKENS  —  "hand-drawn riso zine"
       Brand colors kept (cyan / yellow / coral). Ink-on-paper base.
       Signature: chunky marker outlines + hard offset shadows.
       ============================================================ */
    :root{
  --paper:#f4f1ea; --paper-2:#e9e4d8; --ink:#1b1b1b;
  --cyan:#0e89ad; --yellow:#3aa7c4; --coral:#c0392b; --muted:#6b6459;
  --line:rgba(0,0,0,0.10);
  --mono: ui-monospace,'SF Mono','SFMono-Regular',Menlo,Consolas,monospace;
  --gap:clamp(1.5rem,4vw,3.25rem); --maxw:1180px;
  --shadow:5px 5px 0 #c0392b; --shadow-sm:3px 3px 0 #0e89ad;
}
    [data-theme="dark"]{
  --paper:#15171b; --paper-2:#1e2128; --ink:#ece7da;
  --cyan:#22add4; --yellow:#5bcdec; --coral:#d85040; --muted:#aba499;
  --line:rgba(236,231,218,0.10);
  --shadow:5px 5px 0 #d85040; --shadow-sm:3px 3px 0 #22add4;
}

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--paper);
      color: var(--ink);
      font-family: 'Gaegu', 'Comic Sans MS', cursive, sans-serif;
      font-size: clamp(1.05rem, 1.7vw, 1.2rem);
      line-height: 1.6;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      /* faint dotted paper texture */
      background-image: radial-gradient(var(--line) 1px, transparent 1px);
      background-size: 22px 22px;
      transition: background-color 0.2s ease, color 0.2s ease;
    }
    img { display: block; max-width: 100%; height: auto; }
    a { color: inherit; text-decoration: none; }
    :focus-visible { outline: 3px solid var(--coral); outline-offset: 3px; border-radius: 4px; }

    /* ---- typography ---- */
    h1, h2, h3 { font-weight: 700; line-height: 1.02; letter-spacing: 0.005em; }
    h1 { font-size: clamp(3rem, 8.5vw, 6rem); }
    h2 { font-size: clamp(2.1rem, 5.5vw, 3.4rem); }
    h3 { font-size: clamp(1.45rem, 3vw, 2.1rem); }
    .mono {
      font-family: var(--mono);
      font-size: 0.72rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      font-weight: 500;
    }

    /* ---- signature: marker frame ---- */
    .frame {
      border: 2.5px solid var(--ink);
      border-radius: 16px;
      box-shadow: var(--shadow);
      background: var(--paper);
    }
    .frame--cyan   { box-shadow: 6px 6px 0 var(--cyan); }
    .frame--yellow { box-shadow: 6px 6px 0 var(--yellow); }
    .frame--coral  { box-shadow: 6px 6px 0 var(--coral); }
    .tilt-l { transform: rotate(-1.5deg); }
    .tilt-r { transform: rotate(1.4deg); }

    /* ---- tag / pill ---- */
    .tag {
      display: inline-block;
      font-family: var(--mono);
      font-size: 0.66rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      font-weight: 600;
      padding: 4px 11px;
      border: 2px solid var(--ink);
      border-radius: 50px;
      background: var(--yellow);
      color: var(--ink);
    }

    /* ---- buttons ---- */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-family: 'Gaegu', cursive;
      font-weight: 700;
      font-size: 1.15rem;
      line-height: 1;
      padding: 0.7rem 1.5rem;
      border: 2.5px solid var(--ink);
      border-radius: 50px;
      box-shadow: var(--shadow-sm);
      cursor: pointer;
      transition: transform 0.12s ease, box-shadow 0.12s ease;
      background: var(--paper);
      color: var(--ink);
    }
    .btn:hover { transform: translate(-2px, -2px); box-shadow: 6px 6px 0 var(--ink); }
    .btn:active { transform: translate(2px, 2px); box-shadow: 1px 1px 0 var(--ink); }
    .btn--cyan   { background: var(--cyan);   color: var(--ink); }
    .btn--coral  { background: var(--coral);  color: var(--paper); }
    .btn--yellow { background: var(--yellow);  color: var(--ink); }
    .theme-toggle {
      min-width: 3rem;
      justify-content: center;
      padding: 0.6rem 0.9rem;
      font-size: 1rem;
    }

    /* ============================================================ NAV */
    .nav {
      position: fixed; inset: 0 0 auto 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      gap: 1rem;
      padding: 0.7rem clamp(1rem, 4vw, 2.25rem);
      background: #101010;
      color: #FBF6EC;
      backdrop-filter: blur(10px);
      border-bottom: 2.5px solid #101010;
    }
    .nav-logo {
      display: flex; align-items: center; gap: 0.6rem;
      font-weight: 700; font-size: 1.35rem;
      color: #FBF6EC;
    }
    .nav-logo img {
      width: 40px; height: 40px; object-fit: contain;
      border: 2.5px solid #FBF6EC; border-radius: 10px; background: #FBF6EC; padding: 3px;
    }
    .nav-links { display: flex; align-items: center; gap: 1.75rem; list-style: none; }
    .nav-links a {
      font-size: 1.15rem; font-weight: 700; padding-bottom: 2px;
      color: #FBF6EC;
      border-bottom: 2.5px solid transparent; transition: border-color 0.15s;
    }
    .nav-links a:hover { border-bottom-color: var(--cyan); }
    .nav-burger {
      display: none; background: #FBF6EC; color: #101010;
      border: 2.5px solid #FBF6EC;
      border-radius: 10px; width: 44px; height: 44px; cursor: pointer;
      align-items: center; justify-content: center; box-shadow: var(--shadow-sm);
    }
    .nav-burger span { font-size: 1.4rem; line-height: 1; }
    .nav-mobile {
      display: none; flex-direction: column; gap: 0.25rem;
      position: fixed; top: 64px; left: 0; right: 0; z-index: 99;
      background: #101010; color: #FBF6EC;
      border-bottom: 2.5px solid #FBF6EC;
      padding: 0.5rem clamp(1rem, 4vw, 2.25rem) 1.25rem;
    }
    .nav-mobile.open { display: flex; }
    .nav-mobile a {
      font-size: 1.4rem; font-weight: 700; padding: 0.5rem 0;
      color: #FBF6EC;
      border-bottom: 1.5px solid rgba(251,246,236,0.18);
    }

    /* ============================================================ LAYOUT */
    .container { max-width: var(--maxw); margin: 0 auto; }
    .section { padding: clamp(4rem, 9vw, 7rem) clamp(1.1rem, 4vw, 2.25rem); }
    .section-head { display: flex; align-items: baseline; gap: 1rem; margin-bottom: 2.75rem; flex-wrap: wrap; }
    .section-num {
      font-family: var(--mono); font-size: 0.85rem; font-weight: 700;
      background: var(--ink); color: var(--paper); padding: 3px 9px; border-radius: 6px;
    }

    /* underline scribble accent */
    .scribble { position: relative; display: inline; }
    .scribble::after {
      content: ""; position: absolute; left: -2%; right: -2%; bottom: 0.04em; height: 0.28em;
      background: var(--coral); z-index: -1; border-radius: 50px; transform: rotate(-1deg);
    }

    /* ============================================================ HERO */
    .hero {
      max-width: var(--maxw); margin: 0 auto;
      min-height: 100svh; display: grid; grid-template-columns: 1.15fr 0.85fr;
      align-items: center; gap: var(--gap);
      padding: 7rem clamp(1.1rem, 4vw, 2.25rem) 3.5rem;
    }
    .hero-eyebrow { display: flex; align-items: center; gap: 0.7rem; margin-bottom: 1.4rem; flex-wrap: wrap; }
    .hero-eyebrow .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--cyan); border: 2px solid var(--ink); }
    .hero h1 { margin-bottom: 1.1rem; }
    .hero h1 .cy { color: var(--cyan); }
    .hero-sub { font-size: 1.3rem; color: var(--ink); max-width: 30ch; margin-bottom: 2rem; }
    .hero-actions { display: flex; gap: 0.9rem; flex-wrap: wrap; }

    .hero-visual { position: relative; display: flex; justify-content: center; align-items: center; }
    .badge { width: min(360px, 100%); overflow: hidden; }
    .badge-img { width: 100%; aspect-ratio: 1; object-fit: contain; padding: 1.75rem; background: #fff; border-bottom: 2.5px solid var(--ink); }
    .badge-foot { padding: 0.9rem 1.2rem; }
    .badge-foot .nm { font-size: 1.4rem; font-weight: 700; line-height: 1; }
    .badge-foot .st { font-family: var(--mono); font-size: 0.68rem; letter-spacing: 0.12em; color: var(--muted); margin-top: 4px; }
    .blob { position: absolute; border-radius: 50%; border: 2.5px solid var(--ink); pointer-events: none; }
    .blob-1 { width: 84px; height: 84px; background: var(--yellow); top: -18px; right: 6%; animation: bob 7s ease-in-out infinite; }
    .blob-2 { width: 54px; height: 54px; background: var(--coral); bottom: 4%; left: 2%; animation: bob 6s ease-in-out -3s infinite; }
    @keyframes bob { 0%,100% { transform: translateY(0) rotate(0); } 50% { transform: translateY(-12px) rotate(10deg); } }

    /* ============================================================ ABOUT */
    .about { background: var(--paper-2); border-top: 2.5px solid var(--ink); border-bottom: 2.5px solid var(--ink); }
    .about-grid { display: grid; grid-template-columns: 0.85fr 1.15fr; gap: var(--gap); align-items: center; }
    .about-photo { overflow: hidden; aspect-ratio: 4/5; }
    .about-photo img { width: 100%; height: 100%; object-fit: cover; object-position: top center; }
    .about-copy p { margin-bottom: 1rem; max-width: 56ch; }
    .about-copy strong { color: var(--ink); background: var(--cyan); padding: 0 4px; border-radius: 4px; }
    .about-copy .btn { margin-top: 0.75rem; }

    /* ============================================================ SKILLS */
    .skills-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 1.1rem; }
    .skill { padding: 1.4rem; background: var(--paper); transition: transform 0.12s ease, box-shadow 0.12s ease; }
    .skill:hover { transform: translate(-2px,-2px); box-shadow: 6px 6px 0 var(--cyan); }
    .skill-ic {
      width: 52px; height: 52px; border-radius: 12px; border: 2.5px solid var(--ink);
      display: flex; align-items: center; justify-content: center; font-size: 1.5rem; margin-bottom: 0.85rem;
      background: var(--yellow);
    }
    .skill h3 { font-size: 1.5rem; margin-bottom: 0.2rem; }
    .skill p { font-size: 1.05rem; color: var(--muted); line-height: 1.4; }

    /* ============================================================ WORK */
    .work { background: var(--paper); }
    .group-label { display: flex; align-items: center; gap: 0.9rem; margin: 3.5rem 0 1.75rem; }
    .group-label:first-of-type { margin-top: 0; }
    .group-label .mono { white-space: nowrap; color: var(--muted); }
    .group-label .ln { flex: 1; height: 2.5px; background: var(--ink); border-radius: 50px; }

    .project { display: grid; grid-template-columns: 1fr 1fr; gap: var(--gap); align-items: center; margin-bottom: 1.5rem; }
    .project.flip .project-media { order: 2; }
    .project-media {
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--paper-2);
      min-height: 320px;
    }
    .project-media img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center;
      transition: transform 0.5s ease;
    }
    .project:hover .project-media img { transform: scale(1.04); }
    .project-year { font-family: var(--mono); font-size: 0.72rem; letter-spacing: 0.12em; color: var(--coral); font-weight: 700; margin-bottom: 0.5rem; }
    .project-body h3 { margin-bottom: 0.6rem; }
    .project-body > p { color: var(--ink); max-width: 46ch; }
    .project-body em { font-style: normal; background: var(--yellow); padding: 0 3px; border-radius: 3px; }

    .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 0.9rem; margin: 1.25rem 0 0.5rem; }
    .g-item {
      overflow: hidden;
      aspect-ratio: 1;
      cursor: zoom-in;
      background: var(--paper-2);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .g-item img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center;
      transition: transform 0.35s ease;
    }
    .g-item:hover img { transform: scale(1.07); }

    /* ============================================================ MERCH */
    .merch { background: var(--paper-2); border-top: 2.5px solid var(--ink); border-bottom: 2.5px solid var(--ink); }
    .merch-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.1rem; margin-bottom: 2.25rem; }
    .merch-item {
      overflow: hidden;
      background: var(--paper);
      transition: transform 0.12s ease, box-shadow 0.12s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 280px;
    }
    .merch-item:hover { transform: translate(-2px,-2px); box-shadow: 6px 6px 0 var(--coral); }
    .merch-item img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center;
    }

    /* ============================================================ CONTACT */
    .contact { background: var(--cyan); border-top: 2.5px solid var(--ink); }
    .contact-grid { display: grid; grid-template-columns: 1fr 1fr; gap: var(--gap); align-items: start; }
    .contact h2 { margin-bottom: 0.75rem; }
    .contact-lead { font-size: 1.25rem; max-width: 38ch; margin-bottom: 1.5rem; }
    .contact-links { display: flex; flex-direction: column; gap: 0.9rem; align-items: flex-start; }

    .form { background: var(--paper); padding: clamp(1.3rem, 3vw, 2rem); }
    .form h3 { margin-bottom: 0.3rem; }
    .form .hint { color: var(--muted); font-size: 1rem; margin-bottom: 1.1rem; }
    .field { margin-bottom: 1rem; }
    .field label { display: block; font-family: var(--mono); font-size: 0.7rem; letter-spacing: 0.1em; text-transform: uppercase; font-weight: 700; margin-bottom: 0.35rem; }
    .field input, .field textarea {
      width: 100%; font-family: 'Gaegu', cursive; font-size: 1.15rem; color: var(--ink);
      background: var(--paper-2); border: 2.5px solid var(--ink); border-radius: 12px; padding: 0.6rem 0.8rem;
    }
    .field textarea { resize: vertical; min-height: 110px; }
    .field input:focus, .field textarea:focus { outline: none; box-shadow: var(--shadow-sm); }
    .form .btn { width: 100%; justify-content: center; margin-top: 0.3rem; }
    .form-note { font-size: 0.95rem; color: var(--muted); margin-top: 0.8rem; text-align: center; }

    /* ============================================================ FOOTER */
    .footer {
      background: #101010;
      color: #FBF6EC;
      padding: 2.25rem clamp(1.1rem, 4vw, 2.25rem);
      display: flex; align-items: center; justify-content: space-between; gap: 1rem; flex-wrap: wrap;
    }
    .footer .brand { display: flex; align-items: center; gap: 0.6rem; font-weight: 700; font-size: 1.3rem; }
    .footer .brand img { width: 34px; height: 34px; object-fit: contain; background: #fff; border-radius: 8px; padding: 3px; }
    .footer .meta { font-family: var(--mono); font-size: 0.7rem; letter-spacing: 0.08em; color: rgba(251,246,236,0.7); }
    .footer a:hover { color: var(--cyan); }

    /* ============================================================ LIGHTBOX */
    .lb { position: fixed; inset: 0; z-index: 200; background: rgba(21,22,26,0.94); display: flex; align-items: center; justify-content: center; cursor: zoom-out; padding: 1.5rem; }
    .lb img { max-width: 92vw; max-height: 90vh; object-fit: contain; border: 3px solid var(--paper); border-radius: 10px; }
    .lb-x { position: absolute; top: 1.1rem; right: 1.1rem; width: 48px; height: 48px; border-radius: 12px; border: 2.5px solid var(--paper); background: transparent; color: var(--paper); font-size: 1.4rem; cursor: pointer; }

    /* ---- image fallback (shows when /images not present yet) ---- */
    .img-ph {
      width: 100%; height: 100%; min-height: 120px;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 0.4rem; text-align: center;
      background: repeating-linear-gradient(45deg, var(--paper-2), var(--paper-2) 12px, #ece1c9 12px, #ece1c9 24px);
      color: var(--muted); padding: 1rem;
    }
    .img-ph .ph-skull { font-size: 1.6rem; }
    .img-ph .ph-label { font-family: var(--mono); font-size: 0.62rem; letter-spacing: 0.1em; text-transform: uppercase; line-height: 1.3; }

    /* ============================================================ REVEAL */
    .reveal { opacity: 0; transform: translateY(22px); transition: opacity 0.55s ease, transform 0.55s ease; }
    .reveal.is-visible { opacity: 1; transform: none; }

    /* ============================================================ RESPONSIVE */
    @media (max-width: 900px) {
      .nav-links { display: none; }
      .nav-burger { display: flex; }
      .hero { grid-template-columns: 1fr; padding-top: 6rem; min-height: auto; }
      .hero-visual { order: -1; }
      .badge { width: min(280px, 82%); }
      .about-grid { grid-template-columns: 1fr; }
      .about-photo { aspect-ratio: 16/10; max-height: 360px; }
      .project, .project.flip { grid-template-columns: 1fr; }
      .project.flip .project-media { order: 0; }
      .merch-grid { grid-template-columns: repeat(2, 1fr); }
      .contact-grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 560px) {
      body { background-size: 18px 18px; }
      .gallery { grid-template-columns: repeat(2, 1fr); }
      .footer { flex-direction: column; align-items: flex-start; }
      .hero-sub { font-size: 1.15rem; }
    }
    @media (prefers-reduced-motion: reduce) {
      * { animation: none !important; }
      .reveal { opacity: 1; transform: none; transition: none; }
      html { scroll-behavior: auto; }
    }
  </style>
</head>

    /* ---- image with graceful fallback (so layout holds before /images is deployed) ---- */
    function Img({ src, alt, className, onClick, style }) {
      const [failed, setFailed] = useState(false);
      if (failed) {
        return (
          <div className={"img-ph " + (className || "")} onClick={onClick} style={style} role="img" aria-label={alt}>
            <span className="ph-skull">🐕‍🦺</span>
            <span className="ph-label">{alt}</span>
          </div>
        );
      }
      return <img src={src} alt={alt} className={className} onClick={onClick} style={style} loading="lazy" onError={() => setFailed(true)} />;
    }

    /* ---- scroll reveal hook ---- */
    function useReveal() {
      useEffect(() => {
        const els = document.querySelectorAll(".reveal");
        if (!("IntersectionObserver" in window)) { els.forEach(e => e.classList.add("is-visible")); return; }
        const io = new IntersectionObserver((entries) => {
          entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add("is-visible"); io.unobserve(e.target); } });
        }, { threshold: 0.12, rootMargin: "0px 0px -40px 0px" });
        els.forEach(e => io.observe(e));
        return () => io.disconnect();
      }, []);
    }

    /* ============================================================ NAV */
    function Nav() {
      const [open, setOpen] = useState(false);
      const [theme, setTheme] = useState(() => {
        if (typeof document === 'undefined') return 'light';
        return document.documentElement.dataset.theme === 'dark' ? 'dark' : 'light';
      });
      const close = () => setOpen(false);
      const links = [["About", "#about"], ["Work", "#work"], ["Merch", "#merch"], ["Rates", "rates.html"], ["Contact", "#contact"]];

      useEffect(() => {
        document.documentElement.dataset.theme = theme;
        localStorage.setItem('theme', theme);
      }, [theme]);

      return (
        <>
          <nav className="nav">
            <a className="nav-logo" href="#top" onClick={close}>
              <Img src={LOGO_IMAGE} alt="SkullDAWG Productions logo" />
              DJ&nbsp;H-Minley
            </a>
            <ul className="nav-links">
              {links.map(([l, h]) => <li key={h}><a href={h}>{l}</a></li>)}
            </ul>
            <div style={{ display: "flex", gap: "0.6rem", alignItems: "center" }}>
              <button
                type="button"
                className="btn theme-toggle"
                aria-label={`Switch to ${theme === 'dark' ? 'light' : 'dark'} mode`}
                onClick={() => setTheme(t => t === 'dark' ? 'light' : 'dark')}
              >
                {theme === 'dark' ? '☀' : '🌙'}
              </button>
              <a className="btn btn--cyan" href="#contact" style={{ fontSize: "1rem", padding: "0.5rem 1.1rem" }}>Get in touch</a>
              <button className="nav-burger" aria-label="Menu" aria-expanded={open} onClick={() => setOpen(o => !o)}>
                <span>{open ? "✕" : "☰"}</span>
              </button>
            </div>
          </nav>
          <div className={"nav-mobile" + (open ? " open" : "")}>
            {links.map(([l, h]) => <a key={h} href={h} onClick={close}>{l}</a>)}
            <a href={LINKTREE} target="_blank" rel="noopener" onClick={close}>Linktree ↗</a>
          </div>
        </>
      );
    }

    /* ============================================================ CONTACT */
    function Contact() {
      const [form, setForm] = useState({ name: "", email: "", message: "" });
      const set = (k) => (e) => setForm(f => ({ ...f, [k]: e.target.value }));
      const submit = (e) => {
        e.preventDefault();
        const subject = encodeURIComponent(`Project inquiry from ${form.name || "your site"}`);
        const body = encodeURIComponent(
          `Name: ${form.name}\nEmail: ${form.email}\n\n${form.message}`
        );

      };
      return (
        <section className="section contact" id="contact">
          <div className="container">
            <div className="contact-grid">
              <div className="contact-text reveal">
                <span className="section-num">05</span>
                <h2 style={{ marginTop: "0.9rem" }}>Let's build something together.</h2>

                <div className="contact-links">
                  <a className="btn" href={`mailto:${CONTACT_EMAIL}`}>✉ Email me directly</a>

              <form className="form frame reveal" onSubmit={submit}>

                <div className="field">
                  <label htmlFor="cf-email">Your email</label>
                  <input id="cf-email" type="email" required value={form.email} onChange={set("email")} placeholder="jane@email.com" />
                </div>
                <div className="field">
                  <label htmlFor="cf-msg">What do you need?</label>
                  <textarea id="cf-msg" required value={form.message} onChange={set("message")} placeholder="Tell me about your brand, project, or idea…" />
                </div>
                <button className="btn btn--cyan" type="submit">Send message →</button>

              </form>
            </div>
          </div>
        </section>
      );
    }

    /* ============================================================ LIGHTBOX */
    function Lightbox({ item, onClose }) {
      useEffect(() => {
        if (!item) return;
        const onKey = (e) => { if (e.key === "Escape") onClose(); };
        document.addEventListener("keydown", onKey);
        document.body.style.overflow = "hidden";
        return () => { document.removeEventListener("keydown", onKey); document.body.style.overflow = ""; };
      }, [item]);
      if (!item) return null;
      return (
        <div className="lb" onClick={onClose}>
          <button className="lb-x" aria-label="Close" onClick={onClose}>✕</button>
          <img src={item.src} alt={item.alt} onClick={(e) => e.stopPropagation()} />
        </div>
      );
    }

    /* ============================================================ APP */
    function App() {

      return (

          <Merch />
          <Contact />
          <Footer />
          <Lightbox item={zoom} onClose={() => setZoom(null)} />
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
